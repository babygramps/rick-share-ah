# Group can be a COUPLE (2 people) or a GROUP (3+ people)
enum GroupType {
  COUPLE
  GROUP
}

type Group @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read, update] }
]) {
  id: ID!
  type: GroupType!
  name: String!
  inviteCode: String @index(name: "byInviteCode")
  members: [GroupMember] @hasMany(indexName: "byGroup", fields: ["id"])
  expenses: [Expense] @hasMany(indexName: "byGroup", fields: ["id"])
  settlements: [Settlement] @hasMany(indexName: "byGroup", fields: ["id"])
  ownerId: String 
}

# Legacy Couple Support (For Migration)
type Couple @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read, update] }
]) {
  id: ID!
  name: String!
  partner1Id: String!
  partner1Name: String!
  partner1Email: String!
  partner2Id: String
  partner2Name: String
  partner2Email: String
  inviteCode: String @index(name: "byInviteCode")
  defaultSplitPercent: Int!
  expenses: [Expense] @hasMany(indexName: "byCoupleLegacy", fields: ["id"])
  settlements: [Settlement] @hasMany(indexName: "byCoupleLegacy", fields: ["id"])
}

type GroupMember @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read, create, update, delete] }
]) {
  id: ID!
  groupId: ID! @index(name: "byGroup")
  group: Group @belongsTo(fields: ["groupId"])
  userId: String! @index(name: "byUser")
  name: String!
  email: String
  role: String # "admin", "member"
}

type Expense @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read, create, update, delete] }
]) {
  id: ID!
  
  # New Group Link (Optional during migration)
  groupId: ID @index(name: "byGroup")
  group: Group @belongsTo(fields: ["groupId"])
  
  # Legacy Couple Link
  coupleId: ID @index(name: "byCoupleLegacy")
  couple: Couple @belongsTo(fields: ["coupleId"])
  
  description: String!
  amount: Int!
  paidBy: String!
  
  splitType: String!
  
  partner1Share: Int 
  partner2Share: Int
  
  shares: AWSJSON  
  
  category: String!
  date: AWSDate!
  note: String
}

type Settlement @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read, create, update, delete] }
]) {
  id: ID!
  
  # New Group Link (Optional during migration)
  groupId: ID @index(name: "byGroup")
  group: Group @belongsTo(fields: ["groupId"])
  
  # Legacy Couple Link
  coupleId: ID @index(name: "byCoupleLegacy")
  couple: Couple @belongsTo(fields: ["coupleId"])
  
  amount: Int!
  paidBy: String!
  paidTo: String!
  date: AWSDate!
  note: String
}

type UserPreferences @model @auth(rules: [{ allow: owner }]) {
  id: ID!
  userId: String! @index(name: "byUserId")
  theme: String
}
