version: 1
backend:
  phases:
    preBuild:
      commands:
        # Sync coupleWriteService to current-cloud-backend if missing (fixes state mismatch)
        - |
          if [ ! -d "amplify/#current-cloud-backend/function/coupleWriteService" ]; then
            echo "Syncing coupleWriteService to cloud backend cache..."
            mkdir -p amplify/#current-cloud-backend/function
            cp -r amplify/backend/function/coupleWriteService amplify/#current-cloud-backend/function/
          fi
frontend:
  phases:
    preBuild:
      commands:
        # Remove amplify-backup if it exists (prevents CLI backup failures)
        - rm -rf amplify-backup || true
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*


