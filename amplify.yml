version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Remove amplify-backup if it exists (prevents CLI backup failures)
        - rm -rf amplify-backup || true
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*


